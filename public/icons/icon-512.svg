<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- White rounded background -->
  <rect width="512" height="512" rx="80" fill="#ffffff"/>

  <!-- Outer compass ring -->
  <circle cx="256" cy="256" r="192" fill="none" stroke="#2563EB" stroke-width="6" opacity="0.3"/>
  <circle cx="256" cy="256" r="172" fill="none" stroke="#2563EB" stroke-width="4" opacity="0.15"/>

  <!-- Cardinal direction ticks -->
  <!-- N -->
  <line x1="256" y1="64" x2="256" y2="96" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>
  <!-- S -->
  <line x1="256" y1="416" x2="256" y2="448" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>
  <!-- E -->
  <line x1="416" y1="256" x2="448" y2="256" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>
  <!-- W -->
  <line x1="64" y1="256" x2="96" y2="256" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>

  <!-- Intercardinal ticks -->
  <!-- NE -->
  <line x1="384" y1="128" x2="398" y2="114" stroke="#2563EB" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- SE -->
  <line x1="384" y1="384" x2="398" y2="398" stroke="#2563EB" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- SW -->
  <line x1="128" y1="384" x2="114" y2="398" stroke="#2563EB" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- NW -->
  <line x1="128" y1="128" x2="114" y2="114" stroke="#2563EB" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

  <!-- Compass rose - North pointer (blue filled) -->
  <polygon points="256,100 280,248 256,220 232,248" fill="#2563EB"/>
  <!-- Compass rose - South pointer (blue outline) -->
  <polygon points="256,412 280,264 256,292 232,264" fill="#2563EB" opacity="0.3"/>
  <!-- Compass rose - East pointer (blue filled) -->
  <polygon points="412,256 264,232 292,256 264,280" fill="#2563EB" opacity="0.5"/>
  <!-- Compass rose - West pointer (blue outline) -->
  <polygon points="100,256 248,232 220,256 248,280" fill="#2563EB" opacity="0.5"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="10" fill="#2563EB"/>

  <!-- N letter -->
  <text x="256" y="52" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="#2563EB">N</text>
</svg>
